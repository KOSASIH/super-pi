name: "🛡️ Security Scan — Contracts, Dependencies, Secrets"

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 3 * * 3"  # Weekly Wednesday 03:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # CodeQL analysis
  codeql:
    name: "CodeQL Analysis"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ["cpp", "python", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  # Secret scanning (gitleaks)
  secrets:
    name: "Secret Detection (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Solidity security (Slither + Mythril)
  solidity-security:
    name: "Solidity Security (Slither)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: "--config-file slither.config.json"
          fail-on: high
        continue-on-error: false

  # Rust security
  rust-security:
    name: "Rust Security Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          manifest-path: src/hyper_core/rust/Cargo.toml
          command: check
          arguments: --all-features

  # Trivy container scan
  container:
    name: "Container Security (Trivy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t super-pi:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "super-pi:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
