version: '3.9'

name: super-pi

x-base: &base
  restart: unless-stopped
  networks:
    - superpi-network

x-env: &env
  NODE_ENV: production
  TZ: UTC

services:
  # 🌟 Pi Wallet (Main Frontend + Purity System)
  wallet:
    build:
      context: ./apps/wallet
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      <<: *env
      NEXT_PUBLIC_API_URL: http://api:3002
      NEXT_PUBLIC_PURITY_API: http://purity-node:3003
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/superpi
      REDIS_URL: redis://redis:6379
      WALLET_SECRET: ${WALLET_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      purity-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    <<: *base
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # 🔗 Pi API + Blockchain Node
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20
    ports:
      - "3002:3002"
    environment:
      <<: *env
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/superpi
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PI_BLOCKCHAIN_RPC: http://blockchain:8545
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    <<: *base

  # 🌟 Purity Tracker + Dual Value System
  purity-node:
    build:
      context: ./packages/purity-tracker
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      <<: *env
      REDIS_URL: redis://redis:6379
      EXCHANGE_DB_URL: ${EXCHANGE_DB_URL}
      ML_MODEL_PATH: /app/models/taint-model-v2.onnx
    volumes:
      - purity-data:/app/data
      - ./models:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    <<: *base

  # ⛓️ Pi Blockchain Node (Geth + Custom Pi Chain)
  blockchain:
    image: ethereum/client-go:v1.13.14
    command: >
      --datadir /data 
      --http 
      --http.addr 0.0.0.0 
      --http.port 8545 
      --http.corsdomain "*" 
      --http.api eth,net,web3,debug 
      --ws 
      --ws.addr 0.0.0.0 
      --ws.port 8546 
      --ws.origins "*" 
      --ws.api eth,net,web3,debug 
      --syncmode full 
      --maxpeers 50
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303"
    volumes:
      - blockchain-data:/data
    environment:
      <<: *env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 5
    <<: *base
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # 🗄️ PostgreSQL 16 (Production Ready)
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: superpi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command: postgres -c shared_preload_libraries=pg_stat_statements -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d superpi"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *base
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # 🗃️ Redis Cluster (High Performance)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    <<: *base

  # 📊 Block Explorer
  explorer:
    build: ./apps/explorer
    ports:
      - "3004:3004"
    environment:
      <<: *env
      API_URL: http://api:3002
      BLOCKCHAIN_RPC: http://blockchain:8545
    depends_on:
      api:
        condition: service_healthy
      blockchain:
        condition: service_healthy
    <<: *base

  # 🔍 Pi Coin Analytics + ML Taint Detection
  analytics:
    build: ./packages/analytics
    environment:
      <<: *env
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/superpi_analytics
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *base

  # 🛡️ Nginx Reverse Proxy + SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot
    depends_on:
      - wallet
      - api
      - explorer
    <<: *base

  # 📧 Email Service (Transaction Notifications)
  mail:
    image: maildev/maildev:latest
    ports:
      - "1080:1080"
      - "1025:1025"
    <<: *base

networks:
  superpi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  blockchain-data:
    driver: local
  purity-data:
    driver: local
  certbot-www:
    driver: local
